<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Angkas–DSWD Driver Eligibility Check</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,400;0,500;1,400&family=Bebas+Neue&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f0e8;
      --surface: #ffffff;
      --border: #d6cfc0;
      --accent: #e8380d;
      --accent2: #1a1a2e;
      --text: #1a1a1a;
      --muted: #888077;
      --error-bg: #fff0ee;
      --error-border: #e8380d;
      --success-bg: #eefff6;
      --success-border: #00a651;
      --success: #00a651;
      --mono: 'DM Mono', monospace;
      --display: 'Bebas Neue', sans-serif;
    }

    body {
      background-color: var(--bg);
      font-family: var(--mono);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      background-image:
        repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(0,0,0,0.04) 39px, rgba(0,0,0,0.04) 40px),
        repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(0,0,0,0.04) 39px, rgba(0,0,0,0.04) 40px);
    }

    .wrapper {
      width: 100%;
      max-width: 520px;
      animation: fadeUp 0.5s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Header */
    .header {
      margin-bottom: 2rem;
    }

    .badge {
      display: inline-block;
      font-family: var(--mono);
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      border: 1px solid var(--accent);
      padding: 3px 8px;
      margin-bottom: 0.75rem;
    }

    h1 {
      font-family: var(--display);
      font-size: clamp(2.8rem, 8vw, 4.2rem);
      line-height: 0.95;
      letter-spacing: 0.02em;
      color: var(--accent2);
    }

    h1 span {
      color: var(--accent);
    }

    .subtitle {
      margin-top: 0.75rem;
      font-size: 0.75rem;
      color: var(--muted);
      line-height: 1.6;
      letter-spacing: 0.02em;
    }

    /* Card */
    .card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      padding: 2rem;
      position: relative;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 6px;
      left: 6px;
      right: -6px;
      bottom: -6px;
      background: var(--accent2);
      z-index: -1;
    }

    .field-label {
      display: block;
      font-size: 0.65rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }

    .input-row {
      display: flex;
      gap: 0;
    }

    input[type="text"] {
      flex: 1;
      font-family: var(--mono);
      font-size: 1rem;
      letter-spacing: 0.08em;
      padding: 0.75rem 1rem;
      border: 1.5px solid var(--border);
      border-right: none;
      background: var(--bg);
      color: var(--text);
      outline: none;
      text-transform: uppercase;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus {
      border-color: var(--accent2);
    }

    input[type="text"]::placeholder {
      color: var(--border);
      text-transform: none;
      letter-spacing: 0.02em;
    }

    button {
      font-family: var(--display);
      font-size: 1.1rem;
      letter-spacing: 0.08em;
      padding: 0.75rem 1.4rem;
      background: var(--accent2);
      color: #fff;
      border: 1.5px solid var(--accent2);
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      white-space: nowrap;
    }

    button:hover:not(:disabled) {
      background: var(--accent);
      border-color: var(--accent);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Spinner */
    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Result */
    .result {
      margin-top: 1.25rem;
      padding: 1rem 1.25rem;
      border: 1.5px solid var(--border);
      font-size: 0.8rem;
      line-height: 1.7;
      display: none;
      animation: fadeUp 0.3s ease both;
    }

    .result.show { display: block; }

    .result.eligible {
      border-color: var(--success-border);
      background: var(--success-bg);
    }

    .result.ineligible {
      border-color: var(--error-border);
      background: var(--error-bg);
    }

    .result-tag {
      font-size: 0.6rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      font-weight: 500;
      display: block;
      margin-bottom: 0.4rem;
    }

    .result.eligible .result-tag { color: var(--success); }
    .result.ineligible .result-tag { color: var(--accent); }

    .result-title {
      font-family: var(--display);
      font-size: 1.4rem;
      letter-spacing: 0.04em;
      margin-bottom: 0.5rem;
    }

    .result.eligible .result-title { color: var(--success); }
    .result.ineligible .result-title { color: var(--accent); }

    .result-instructions {
      color: var(--text);
      white-space: pre-line;
    }

    /* Footer */
    .footer {
      margin-top: 1.5rem;
      font-size: 0.62rem;
      color: var(--muted);
      letter-spacing: 0.06em;
      text-align: center;
      line-height: 1.8;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="header">
      <span class="badge">DSWD × Angkas</span>
      <h1>DRIVER<br><span>ELIGIBILITY</span><br>CHECK</h1>
      <p class="subtitle">Enter your driver's license number to verify<br>your eligibility status in the system.</p>
    </div>

    <div class="card">
      <label class="field-label" for="license">Driver's License No.</label>
      <div class="input-row">
        <input
          type="text"
          id="license"
          placeholder="e.g. N01-23-456789"
          maxlength="20"
          autocomplete="off"
          spellcheck="false"
        />
        <button id="submitBtn" onclick="checkLicense()">CHECK</button>
      </div>

      <div class="result" id="result">
        <span class="result-tag" id="resultTag"></span>
        <div class="result-title" id="resultTitle"></div>
        <div class="result-instructions" id="resultInstructions"></div>
      </div>
    </div>

    <div class="footer">
      Data is handled in accordance with RA 10173 (Data Privacy Act of 2012).<br>
      For concerns, contact your DSWD field office.
    </div>
  </div>

  <script>
    // ⚠️ Replace this with your actual Supabase Edge Function URL after deploying
    const EDGE_FUNCTION_URL = 'https://khnflhnjcedxkkxgawwf.supabase.co/functions/v1/check-license';

    async function checkLicense() {
      const input = document.getElementById('license');
      const btn = document.getElementById('submitBtn');
      const result = document.getElementById('result');
      const license = input.value.trim().toUpperCase();

      if (!license) {
        showResult('ineligible', 'Missing Input', 'Please enter a license number.');
        return;
      }

      // Loading state
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Checking...';
      result.className = 'result';

      try {
        const res = await fetch(EDGE_FUNCTION_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ license }),
        });

        const data = await res.json();

        if (!res.ok) {
          showResult('ineligible', 'Not Found', data.error || 'License number not found in the system.');
        } else if (data.eligible) {
          showResult('eligible', 'Eligible', data.instructions || 'You are eligible. Please proceed to your DSWD field office.');
        } else {
          showResult('ineligible', 'Not Eligible', data.reason || 'Your license number is not eligible.');
        }
      } catch (err) {
        showResult('ineligible', 'Error', 'Could not reach the server. Please try again.');
      } finally {
        btn.disabled = false;
        btn.innerHTML = 'CHECK';
      }
    }

    function showResult(type, title, message) {
      const result = document.getElementById('result');
      document.getElementById('resultTag').textContent = type === 'eligible' ? '✓ Verified' : '✗ Status';
      document.getElementById('resultTitle').textContent = title;
      document.getElementById('resultInstructions').textContent = message;
      result.className = `result show ${type}`;
    }

    // Allow Enter key to submit
    document.getElementById('license').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') checkLicense();
    });
  </script>
</body>
</html>
